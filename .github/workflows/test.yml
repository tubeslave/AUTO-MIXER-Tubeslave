name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y portaudio19-dev libsndfile1

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pytest pytest-asyncio

      - name: Verify Python compilation
        run: |
          python -m py_compile backend/signal_analysis.py
          python -m py_compile backend/auto_phase_gcc_phat.py
          python -m py_compile backend/feedback_detector.py
          python -m py_compile backend/thread_safety.py
          python -m py_compile backend/osc_manager.py
          python -m py_compile backend/mixer_state.py
          python -m py_compile backend/routing.py
          python -m py_compile backend/session_manager.py
          python -m py_compile backend/audio_capture.py
          python -m py_compile backend/auth.py
          python -m py_compile backend/auto_mastering.py
          python -m py_compile backend/logging_config.py
          python -m py_compile backend/metrics.py
          python -m py_compile backend/config_manager.py
          python -m py_compile backend/neural_mix_extractor.py
          python -m py_compile backend/style_transfer.py
          python -m py_compile backend/processing_graph.py

      - name: Run tests
        run: python -m pytest tests/ -x --tb=short -q
        env:
          PYTHONPATH: backend
