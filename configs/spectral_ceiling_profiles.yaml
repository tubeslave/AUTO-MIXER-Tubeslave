profiles:
  lead_vocal:
    description: "Главный вокал, должен быть впереди микса"
    target_profile: "lead_vocal_pop_presence"
    guide: custom
    slope_db_per_oct: -3.0
    front_back_position: foreground
    low_cut_hz: [70, 120]
    high_cut_hz: [12000, 16000]
    important_zones:
      body: [150, 350]
      intelligibility: [1000, 2500]
      presence: [2500, 5000]
      air: [8000, 14000]
    avoid:
      mud: [180, 400]
      harshness: [2500, 4500]
      sibilance: [5500, 9000]
    max_eq_gain_db: 3.0
    max_eq_cut_db: -4.0

  backing_vocal:
    description: "Бэк-вокал должен поддерживать lead vocal и не конкурировать с ним"
    target_profile: "backing_vocal_blend"
    guide: custom
    slope_db_per_oct: -4.5
    front_back_position: background
    low_cut_hz: [100, 180]
    high_cut_hz: [9000, 12000]
    important_zones:
      body: [200, 500]
      blend: [800, 2500]
    avoid:
      lead_conflict: [2500, 6000]
      sibilance: [5500, 9000]
    max_eq_gain_db: 2.0
    max_eq_cut_db: -4.0

  kick:
    description: "Бочка: фундамент, удар, читаемость атаки"
    target_profile: "kick_foundation_punch"
    guide: custom
    slope_db_per_oct: -4.5
    front_back_position: midground
    low_cut_hz: [25, 40]
    high_cut_hz: [8000, 12000]
    important_zones:
      sub: [40, 70]
      punch: [70, 120]
      click: [2500, 5000]
    avoid:
      mud: [180, 400]
      boxiness: [400, 700]
    max_eq_gain_db: 3.0
    max_eq_cut_db: -5.0

  snare:
    description: "Малый барабан: тело, щелчок, присутствие"
