mixer:
  type: wing
  ip: 192.168.1.102
  port: 2223
  protocol: osc
  tls: false
  midi_base_channel: 0
  keepalive_interval: 5.0
  command_rate_limit: 10.0
  connection_timeout: 10.0
audio:
  sample_rate: 48000
  block_size: 1024
  channels: 64
  source: sounddevice
  device_name: ''
  buffer_seconds: 5.0
websocket:
  host: 0.0.0.0
  port: 8765
  max_clients: 10
agent:
  enabled: true
  mode: auto
  cycle_interval: 0.5
  confidence_threshold: 0.6
  max_actions_per_cycle: 5
ai:
  llm_backend: auto
  llm_model: kimi-k2.5:cloud
  kimi_cli_path: ''
  kimi_work_dir: ''
  kimi_timeout_sec: 120
  model_fallbacks:
  - kimi_cli:default
  - ollama:kimi-k2.5:cloud
  - ollama:qwen3:0.6b
  openai_api_key: ''
  openai_url: https://api.openai.com/v1/responses
  openai_reasoning_effort: low
  ollama_url: http://localhost:11434
  perplexity_api_key: ''
  knowledge_dir: ''
safety:
  feedback_detection: true
  max_gain_db: 12.0
  true_peak_limit: -1.0
  max_notch_filters: 8
  max_notch_depth_db: -12.0
logging:
  level: INFO
  json_output: false
  log_file: ''
metrics:
  enabled: false
  prometheus_port: 9090
session:
  auto_save: true
  save_interval: 300
  session_dir: sessions
soundcheck:
  auto_apply: true
  signal_threshold_db: -50.0
  analysis_seconds: 3.0
  analysis_timeout_seconds: 30.0
  gain_correction_max_db: 12.0
training:
  enabled: false
  safe_autostart: false
  interval_minutes: 360
  manifest_url: ''
  request_timeout_sec: 30
  max_retries: 2
  max_dataset_bytes: 21474836480
  study:
    enabled: false
    max_resources_per_run: 0
    max_resources_per_type: 0
    max_resource_bytes: 0
    timeout_sec: 30
    max_retries: 1
    output_dir: backend/ai/knowledge
    source_types:
    - books
    - articles
    - videos
    allowed_domains:
    - arxiv.org
    - openlibrary.org
    - archive.org
    - wikipedia.org
    - ieee.org
    - acm.org
    - mdpi.com
    - nature.com
    queries:
      books:
      - audio engineering handbook
      - mixing and mastering reference
      articles:
      - audio mixing study
      - digital signal processing music
      videos:
      - audio mixing tutorial
    resource_urls: []
    feeds: []
  cleanup_downloads: true
  discovery:
    enabled: true
    max_candidates_per_target: 3
    hf_search_limit: 8
    candidate_urls: []
    queries:
      channel_classifier:
      - audio instrument classification dataset jsonl
      - music spectral features instrument
      - audio events melspectrogram classification
      gain_pan_predictor:
      - multichannel audio gains pans dataset npz
      - music mix parameters gain pan npz
      - source separation gain pan metadata
      mix_console:
      - multitrack music stems dataset
      - audio multitrack reference mix dataset
      - music source separation multitracks
  artifacts_dir: models
  dataset_dir: models/training_datasets
  state_file: models/training_state.json
  targets:
    channel_classifier:
      enabled: false
      output_path: models/channel_classifier.pt
      n_epochs: 20
      batch_size: 32
      lr: 0.001
      n_samples_per_class: 100
      n_mels: 64
      n_frames: 64
      n_channels: 8
      device: cpu
      train_without_dataset: false
    gain_pan_predictor:
      enabled: false
      output_path: models/gain_pan_predictor.pt
      n_epochs: 30
      batch_size: 16
      lr: 0.001
      n_channels: 8
      n_samples: 500
      n_audio_len: 8192
      device: cpu
      train_without_dataset: false
    mix_console:
      enabled: false
      output_path: models/mix_console.pt
      n_epochs: 30
      lr: 0.01
      n_channels: 8
      audio_len: 16384
      n_samples: 200
      sample_rate: 48000
      device: cpu
      train_without_dataset: false
