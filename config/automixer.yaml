# AUTO-MIXER-Tubeslave Configuration
# Target setup: Behringer Wing Rack over OSC

mixer:
  type: "wing"
  ip: "192.168.1.102"
  port: 2223
  protocol: "osc"
  tls: false
  midi_base_channel: 0
  keepalive_interval: 5.0
  command_rate_limit: 10.0
  connection_timeout: 10.0

audio:
  sample_rate: 48000
  block_size: 1024
  channels: 64
  source: "sounddevice"  # soundgrid, dante, sounddevice, test_sine, test_pink_noise, silence
  # Empty = auto; or substring to match (e.g. "Dante", "Waves SoundGrid")
  device_name: ""
  buffer_seconds: 5.0

websocket:
  host: "0.0.0.0"
  port: 8765
  max_clients: 10

agent:
  enabled: true
  mode: "auto"  # auto = apply without confirmation; suggest, manual
  cycle_interval: 0.5
  confidence_threshold: 0.6
  max_actions_per_cycle: 5

ai:
  # Kimi CLI is the first choice; Ollama stays as an optional fallback if running locally.
  llm_backend: "auto"  # auto, kimi_cli, openai, ollama, perplexity
  llm_model: "kimi-k2.5:cloud"
  kimi_cli_path: ""   # optional; default: kimi on PATH (or KIMI_CLI_PATH / AUTOMIXER_KIMI_CLI)
  kimi_work_dir: ""   # optional; default: .automixer/kimi_work under repo root
  kimi_timeout_sec: 120
  model_fallbacks:
    - "kimi_cli:default"
    - "ollama:kimi-k2.5:cloud"
    - "ollama:qwen3:0.6b"
  openai_api_key: ""  # or set OPENAI_API_KEY in the environment
  openai_url: "https://api.openai.com/v1/responses"
  openai_reasoning_effort: "low"
  ollama_url: "http://localhost:11434"
  perplexity_api_key: ""
  knowledge_dir: ""

safety:
  feedback_detection: true
  max_gain_db: 12.0
  true_peak_limit: -1.0
  max_notch_filters: 8
  max_notch_depth_db: -12.0

logging:
  level: "INFO"
  json_output: false
  log_file: ""

metrics:
  enabled: false
  prometheus_port: 9090

session:
  auto_save: true
  save_interval: 300
  session_dir: "sessions"

# Auto Soundcheck Engine settings
soundcheck:
  auto_apply: true
  signal_threshold_db: -50.0
  analysis_seconds: 3.0
  analysis_timeout_seconds: 30.0
  gain_correction_max_db: 12.0
