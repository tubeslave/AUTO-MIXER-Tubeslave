    value_type: "float"
  compressor.attack:
    data_path: "ch.{channel_index}.dyn.attack"
    format: "plain"
    value_type: "float"
  compressor.hold:
    data_path: "ch.{channel_index}.dyn.hold"
    format: "plain"
    value_type: "float"
  compressor.release:
    data_path: "ch.{channel_index}.dyn.release"
    format: "plain"
    value_type: "float"
  compressor.detector:
    data_path: "ch.{channel_index}.dyn.det"
    format: "plain"
    value_type: "int"
  compressor.envelope:
    data_path: "ch.{channel_index}.dyn.env"
    format: "plain"
    value_type: "int"
