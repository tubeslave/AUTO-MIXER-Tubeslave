profile: "wing_rack"
parameters:
  fader:
    data_path: "ch.{channel_index}.mix.lvl"
    format: "plain"
    value_type: "float"
  mute:
    data_path: "ch.{channel_index}.mix.on"
    format: "plain"
    value_type: "bool"
    invert_bool: true
  pan:
    data_path: "ch.{channel_index}.mix.pan"
    format: "plain"
    value_type: "float"
    value_multiplier: 100.0
  bus.fader:
    data_path: "ch.{channel_absolute_index}.mix.lvl"
    format: "plain"
    value_type: "float"
  dca.fader:
    data_path: "ch.{channel_absolute_index}.mix.lvl"
    format: "plain"
    value_type: "float"
  main.fader:
    data_path: "ch.{channel_absolute_index}.mix.lvl"
    format: "plain"
    value_type: "float"
  gain:
    data_path: "ch.{channel_index}.preamp.trim"
    format: "plain"
    value_type: "float"
  phase.invert:
    data_path: "ch.{channel_index}.preamp.inv"
    format: "plain"
    value_type: "bool"
  polarity.invert:
    data_path: "ch.{channel_index}.preamp.inv"
    format: "plain"
    value_type: "bool"
  delay.enabled:
    data_path: "ch.{channel_index}.delay.on"
    format: "plain"
    value_type: "bool"
  delay.time:
    data_path: "ch.{channel_index}.delay.time"
    format: "plain"
    value_type: "float"
  hpf.enabled:
    data_path: "ch.{channel_index}.preamp.filter.0.on"
    format: "plain"
    value_type: "bool"
  hpf.frequency:
    data_path: "ch.{channel_index}.preamp.filter.0.freq"
    format: "plain"
    value_type: "float"
  peq.band{band}.enabled:
    data_path: "ch.{channel_index}.peq.on"
    format: "plain"
    value_type: "bool"
  peq.band{band}.frequency:
    data_path: "ch.{channel_index}.peq.bands.{band_index}.freq"
    format: "plain"
    value_type: "float"
  peq.band{band}.gain:
    data_path: "ch.{channel_index}.peq.bands.{band_index}.gain"
    format: "plain"
    value_type: "float"
  peq.band{band}.q:
    data_path: "ch.{channel_index}.peq.bands.{band_index}.q"
    format: "plain"
    value_type: "float"
  peq.band{band}.type:
    data_path: "ch.{channel_index}.peq.bands.{band_index}.type"
    format: "plain"
    value_type: "int"
  send.aux{send_index}.level:
    data_path: "ch.{channel_index}.mix.sends.{send_index_zero}.lvl"
    format: "plain"
    value_type: "float"
  send.fx{send_index}.level:
    data_path: "ch.{channel_index}.mix.sends.{send_index_zero}.lvl"
    format: "plain"
    value_type: "float"
  compressor.threshold:
    data_path: "ch.{channel_index}.dyn.thr"
    format: "plain"
    value_type: "float"
  compressor.enabled:
    data_path: "ch.{channel_index}.dyn.on"
    format: "plain"
    value_type: "bool"
  compressor.raw_enabled:
    data_path: "ch.{channel_index}.rawDyn.on"
    format: "plain"
    value_type: "bool"
  compressor.model:
    data_path: "ch.{channel_index}.rawDyn.model"
    format: "plain"
    value_type: "int"
  compressor.mix:
    data_path: "ch.{channel_index}.dyn.mix"
    format: "plain"
    value_type: "float"
