    format: "plain"
    value_type: "int"
  compressor.filter.source:
    data_path: "ch.{channel_index}.dyn.filter.src"
    format: "plain"
    value_type: "int"
  compressor.filter.frequency:
    data_path: "ch.{channel_index}.dyn.filter.freq"
    format: "plain"
    value_type: "float"
  compressor.filter.type:
    data_path: "ch.{channel_index}.dyn.filter.type"
    format: "plain"
    value_type: "int"
  compressor.filter.band{band}.type:
    data_path: "ch.{channel_index}.dyn.filter.filters.bands.{band_index}.type"
    format: "plain"
    value_type: "int"
  compressor.filter.band{band}.frequency:
    data_path: "ch.{channel_index}.dyn.filter.filters.bands.{band_index}.freq"
    format: "plain"
    value_type: "float"
  compressor.filter.band{band}.q:
    data_path: "ch.{channel_index}.dyn.filter.filters.bands.{band_index}.q"
    format: "plain"
    value_type: "float"
  gate.enabled:
    data_path: "ch.{channel_index}.gate.on"
    format: "plain"
    value_type: "bool"
  gate.threshold:
    data_path: "ch.{channel_index}.gate.thr"
    format: "plain"
    value_type: "float"
  gate.range:
    data_path: "ch.{channel_index}.gate.range"
    format: "plain"
    value_type: "float"
  gate.attack:
    data_path: "ch.{channel_index}.gate.attack"
    format: "plain"
    value_type: "float"
  gate.hold:
    data_path: "ch.{channel_index}.gate.hold"
    format: "plain"
    value_type: "float"
  gate.release:
    data_path: "ch.{channel_index}.gate.release"
    format: "plain"
    value_type: "float"
  channel.name:
    data_path: "ch.{channel_index}.cfg.name"
    format: "plain"
    value_type: "string"
    max_length: 16
  channel.color:
    data_path: "ch.{channel_index}.cfg.color"
    format: "plain"
    value_type: "int"
    enum_map:
      blue: 0
      cyan: 3
      green: 4
      yellow: 6
      brown: 7
      red: 8
      pink: 10
      purple: 11
      orange: 12
      teal: 15
      gray: 16
      white: 17
  main.peq.band{band}.frequency:
    data_path: "ch.{channel_absolute_index}.peq.bands.{band_index}.freq"
    format: "plain"
    value_type: "float"
  main.peq.band{band}.enabled:
    data_path: "ch.{channel_absolute_index}.peq.on"
    format: "plain"
    value_type: "bool"
  main.peq.band{band}.gain:
    data_path: "ch.{channel_absolute_index}.peq.bands.{band_index}.gain"
    format: "plain"
    value_type: "float"
  main.peq.band{band}.q:
    data_path: "ch.{channel_absolute_index}.peq.bands.{band_index}.q"
    format: "plain"
    value_type: "float"
